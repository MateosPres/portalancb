        /* ── BADGE RARITY ANIMATIONS ── */
        @keyframes badgeGlowRare {
            0%, 100% {
                box-shadow:
                    inset 0 0 0 2px rgba(147, 197, 253, 0.65),
                    inset 0 0 10px rgba(96, 165, 250, 0.3),
                    0 0 6px 2px rgba(96, 165, 250, 0.35);
                filter: brightness(1.0);
            }
            50% {
                box-shadow:
                    inset 0 0 0 2.5px rgba(191, 219, 254, 1.0),
                    inset 0 0 18px rgba(96, 165, 250, 0.6),
                    0 0 10px 3px rgba(59, 130, 246, 0.55);
                filter: brightness(1.08);
            }
        }
        @keyframes badgeGlowEpic {
            0%, 100% {
                box-shadow:
                    inset 0 0 0 2px rgba(192, 132, 252, 0.8),
                    inset 0 0 10px rgba(168, 85, 247, 0.45),
                    0 0 6px 2px rgba(147, 51, 234, 0.6);
                filter: saturate(1.15) brightness(1.02);
            }
            50% {
                box-shadow:
                    inset 0 0 0 2.5px rgba(216, 180, 254, 1.0),
                    inset 0 0 18px rgba(168, 85, 247, 0.85),
                    0 0 10px 3px rgba(126, 34, 206, 0.82);
                filter: saturate(1.5) brightness(1.14);
            }
        }
        @keyframes badgeGlowLegendary {
            0%, 100% {
                box-shadow:
                    inset 0 0 0 2px rgba(253, 224, 71, 0.9),
                    inset 0 0 10px rgba(250, 204, 21, 0.55),
                    0 0 6px 2px rgba(250, 204, 21, 0.7);
                filter: saturate(1.25) brightness(1.06);
            }
            50% {
                box-shadow:
                    inset 0 0 0 2.5px rgba(255, 255, 255, 1.0),
                    inset 0 0 18px rgba(250, 204, 21, 0.95),
                    0 0 10px 3px rgba(249, 115, 22, 0.9);
                filter: saturate(1.75) brightness(1.25);
            }
        }
        @keyframes badgeInnerShimmer {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.85; }
        }
        @keyframes badgeLegendarySparkle {
            0%   { opacity: 0;   background-position: 18% 78%, 62% 18%, 43% 53%, 82% 68%, 29% 32%; }
            15%  { opacity: 0.9; }
            50%  { opacity: 0.5; background-position: 20% 72%, 65% 22%, 46% 48%, 79% 72%, 32% 28%; }
            85%  { opacity: 0.85; }
            100% { opacity: 0;   background-position: 22% 66%, 68% 26%, 49% 43%, 76% 76%, 35% 24%; }
        }

        .badge-rarity {
            position: relative;
            isolation: isolate;
            overflow: visible !important;
            will-change: transform, filter;
        }
        .badge-rarity > * { position: relative; z-index: 2; }
        .badge-rarity::before,
        .badge-rarity::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0;
            z-index: 1;
        }

        /* RARA – blue pulsing ring */
        .badge-rarity-rara {
            animation: badgeGlowRare 2.8s ease-in-out infinite;
        }

        /* ÉPICA – purple pulsing ring + inner shimmer */
        .badge-rarity-epica {
            animation: badgeGlowEpic 2.2s ease-in-out infinite;
        }
        .badge-rarity-epica::before {
            opacity: 1;
            background:
                radial-gradient(circle at 20% 25%, rgba(233, 213, 255, 0.28) 0%, transparent 42%),
                radial-gradient(circle at 80% 30%, rgba(196, 181, 253, 0.32) 0%, transparent 40%),
                radial-gradient(circle at 50% 95%, rgba(147, 51, 234, 0.38) 0%, transparent 55%);
            animation: badgeInnerShimmer 2.2s ease-in-out infinite;
        }

        /* LENDÁRIA – gold pulsing ring + inner glow + sparkle dots */
        .badge-rarity-lendaria {
            animation: badgeGlowLegendary 1.8s ease-in-out infinite;
        }
        .badge-rarity-lendaria::before {
            opacity: 1;
            background:
                radial-gradient(circle at 50% 50%, rgba(254, 240, 138, 0.4) 0%, rgba(250, 204, 21, 0.25) 38%, rgba(249, 115, 22, 0.12) 62%, transparent 80%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.05) 38%, transparent 62%);
            animation: badgeInnerShimmer 1.8s ease-in-out infinite;
        }
        .badge-rarity-lendaria::after {
            opacity: 1;
            background-image:
                radial-gradient(circle, rgba(255, 251, 235, 0.95) 0 1.5px, transparent 2px),
                radial-gradient(circle, rgba(254, 240, 138, 0.92) 0 1.5px, transparent 2px),
                radial-gradient(circle, rgba(251, 191, 36, 0.92) 0 1.5px, transparent 2px),
                radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 1.5px, transparent 2px),
                radial-gradient(circle, rgba(250, 204, 21, 0.88) 0 1.5px, transparent 2px);
            background-repeat: no-repeat;
            background-size: 5px 5px, 4px 4px, 5px 5px, 4px 4px, 5px 5px;
            animation: badgeLegendarySparkle 2s ease-in-out infinite;
            mix-blend-mode: screen;
        }

        @media (prefers-reduced-motion: reduce) {
            .badge-rarity, .badge-rarity::before, .badge-rarity::after {
                animation: none !important;
            }
        }
    </style>
