<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANCB Overlay Live</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/sfO9ILj.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" crossorigin="anonymous">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ancb: {
                            orange: '#F27405',
                            blue: '#062553'
                        }
                    },
                    animation: {
                        fadeIn: 'fadeIn 0.35s ease-out',
                        slideDown: 'slideDown 0.35s ease-out'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-8px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
            font-family: 'Roboto', sans-serif;
        }

        #overlay-root {
            width: 100%;
            height: 100%;
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="overlay-root"></div>
    <script type="module" src="./overlay-main.tsx"></script>
</body>
</html>
