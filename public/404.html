<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANCB MT</title>
  <script>
    // GitHub Pages SPA fallback: redireciona para home com hash preservado.
    (function () {
      var path = window.location.pathname.replace(/^\/+/, '');
      var targetHash = path ? '#home' : window.location.hash || '#home';
      window.location.replace('/' + targetHash);
    })();
  </script>
</head>
<body></body>
</html>
